<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นามบัตรดิจิทัล — Green Yellow Transport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Saira:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  /* ============================================================
     EDIT YOUR DETAILS IN THE <script> CONFIG AT THE BOTTOM ↓↓↓
     ============================================================ */
  :root{
    --card:#FFFFFF; --ink:#171A1E; --ink-soft:#39414A; --muted:#69717A;
    --hair:#E4E8E4; --soft:#F5F7F5; --soft2:#EEF1EE;
    --green:#0E9B4A; --green-deep:#0A7B3A; --yellow:#FFCE00; --gold:#8F6606;
    --latin:'Saira',sans-serif;
    --cond:'Saira Condensed','IBM Plex Sans Thai',sans-serif;
    --thai:'IBM Plex Sans Thai',sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:#E7EAE7}
  body{
    font-family:var(--thai);color:var(--ink);
    min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;
    padding:max(16px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));
  }
  .card{
    width:100%;max-width:430px;background:var(--card);
    border:1px solid var(--hair);border-radius:20px;overflow:hidden;
    box-shadow:0 22px 54px rgba(20,32,22,.16);
    display:flex;flex-direction:column;
  }

  /* signature green → yellow accent */
  .accent{height:8px;flex:none;background:linear-gradient(90deg,var(--green) 0%,#4FC07A 50%,var(--yellow) 100%)}

  /* brand */
  .brand{padding:24px 24px 12px;display:flex;align-items:center;gap:16px}
  .logo{width:88px;height:62px;flex:none;display:grid;place-items:center}
  .logo img{width:100%;height:100%;object-fit:contain;display:block}
  .brand-name{font-family:var(--cond);text-transform:uppercase;line-height:.98}
  .brand-name .g{color:var(--green)}
  .brand-name .y{color:var(--gold)}
  .brand-name .l1{font-size:23px;font-weight:700;letter-spacing:.01em}
  .brand-name .l2{font-size:23px;font-weight:700;color:var(--ink);letter-spacing:.06em}
  .brand-sub{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--muted);margin-top:5px}

  /* identity */
  .id{padding:14px 24px 20px}
  .name-th{font-family:var(--thai);font-weight:700;font-size:32px;line-height:1.06;letter-spacing:-.01em;color:var(--ink)}
  .name-en{font-family:var(--cond);text-transform:uppercase;font-weight:600;
    font-size:14px;letter-spacing:.18em;color:var(--muted);margin-top:6px}
  .title-row{display:flex;align-items:center;gap:11px;margin-top:18px;flex-wrap:wrap}
  .title-row::before{content:"";width:22px;height:3px;background:var(--green);border-radius:2px;flex:none}
  .title-th{font-family:var(--thai);font-weight:700;font-size:17px;color:var(--ink)}
  .title-en{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--green);font-weight:700}

  /* actions */
  .actions{padding:4px 18px 18px;display:grid;grid-template-columns:1fr;gap:11px}
  .act{
    display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1.5px solid var(--hair);border-radius:14px;
    padding:14px 16px;transition:transform .12s ease,border-color .12s ease,background .12s ease;
    cursor:pointer;font-family:var(--thai)}
  .act:hover{border-color:var(--green);background:var(--soft)}
  .act:active{transform:scale(.98)}
  .act:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .act .ico{width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;
    background:var(--soft);border:1px solid var(--hair)}
  .act .ico svg{width:22px;height:22px;stroke:var(--green);fill:none;stroke-width:1.8}
  .act .tx{display:flex;flex-direction:column;line-height:1.18;min-width:0}
  .act .tx .k{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--muted)}
  .act .tx .v{font-size:16.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .act.wide .v{white-space:normal;overflow:visible;word-break:break-word}
  .act.save{background:var(--green);border-color:var(--green);color:#fff}
  .act.save .ico{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.28)}
  .act.save .ico svg{stroke:#fff}
  .act.save .tx .k{color:rgba(255,255,255,.82)}
  .act.save .v{font-weight:700;white-space:normal;color:#fff}
  .act.save:hover{background:#11ab53;border-color:#11ab53}
  .act.qrbtn{background:var(--card);border-style:dashed;justify-content:center;color:var(--muted)}
  .act.qrbtn .v{font-family:var(--mono);font-size:12px;letter-spacing:.12em}
  .act.qrbtn:hover{color:var(--green-deep);border-color:var(--green)}

  /* footer */
  .foot{padding:18px 24px 22px;background:var(--soft2);border-top:1px solid var(--hair);margin-top:auto}
  .foot .co{font-family:var(--thai);font-size:12.5px;color:var(--muted);line-height:1.5}
  .foot .co b{color:var(--ink);font-weight:700}
  .foot .co.en{font-family:var(--latin);font-size:11.5px;letter-spacing:.01em;
    margin-top:11px;padding-top:11px;border-top:1px solid var(--hair)}
  .foot .co.en b{text-transform:uppercase;letter-spacing:.02em;font-size:12px}
  .foot .co .tax{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.02em;
    color:var(--green-deep);font-weight:700;margin-top:4px}

  /* QR modal */
  .modal{position:fixed;inset:0;background:rgba(18,26,20,.55);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  .modal.on{display:flex}
  .qrbox{background:#fff;border:1px solid var(--hair);border-radius:18px;
    padding:26px;text-align:center;max-width:300px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .qrbox h3{font-family:var(--cond);text-transform:uppercase;letter-spacing:.14em;
    font-size:16px;font-weight:700;margin-bottom:4px;color:var(--ink)}
  .qrbox p{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:16px;word-break:break-all}
  #qr{display:inline-block;padding:12px;background:#fff;border:1px solid var(--hair);border-radius:12px}
  #qr img,#qr canvas{display:block}
  .qrbox button{margin-top:18px;width:100%;padding:13px;border:none;border-radius:11px;
    background:var(--green);color:#fff;font-family:var(--cond);font-weight:700;
    text-transform:uppercase;letter-spacing:.1em;font-size:13px;cursor:pointer}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card" id="card">
    <div class="accent"></div>

    <header class="brand">
      <div class="logo"><img src="logo.png" alt="โลโก้ Green Yellow Transport"></div>
      <div>
        <div class="brand-name">
          <div><span class="l1"><span class="g">GREEN</span> <span class="y">YELLOW</span></span></div>
          <div class="l2">TRANSPORT</div>
        </div>
        <div class="brand-sub" id="b-sub">THAILAND CO., LTD.</div>
      </div>
    </header>

    <section class="id">
      <div class="name-th" id="i-nameth">[ ชื่อ–นามสกุล ]</div>
      <div class="name-en" id="i-nameen">[ NAME SURNAME ]</div>
      <div class="title-row">
        <span class="title-th" id="i-titleth">ผู้จัดการฝ่ายปฏิบัติการ</span>
        <span class="title-en" id="i-titleen">OPERATIONS MANAGER</span>
      </div>
    </section>

    <nav class="actions" id="actions"></nav>

    <footer class="foot">
      <div class="co">
        <b id="f-coth"></b><br>
        <span id="f-addr"></span>
        <span class="tax" id="f-tax"></span>
      </div>
      <div class="co en">
        <b id="f-coen"></b><br>
        <span id="f-addren"></span>
        <span class="tax" id="f-taxen"></span>
      </div>
    </footer>
  </main>

  <div class="modal" id="modal">
    <div class="qrbox">
      <h3>Scan to connect</h3>
      <p id="qr-url">—</p>
      <div id="qr"></div>
      <button id="qr-close">ปิด</button>
    </div>
  </div>

<script>
/* ============================================================
   ✏️  แก้ข้อมูลทั้งหมดได้ที่นี่ที่เดียว  ✏️
   ============================================================ */
const CARD = {
  nameTh:   "พิศลย์ โพนทองถิ่น (คิว)",
  nameEn:   "Pisoln Ponthongthin (CUE)",
  titleTh:  "ผู้จัดการฝ่ายปฏิบัติการ",
  titleEn:  "OPERATIONS MANAGER",
  companyTh:"บริษัท กรีนเยลโล่ ทรานสปอร์ต (ประเทศไทย) จำกัด",
  companyEn:"GREEN YELLOW TRANSPORT (THAILAND) CO.,LTD.",

  phone:    "081-828-7991",
  phone2:   "086-412-5355",
  email:    "greenyellowtransportthai@hotmail.com",
  lineId:   "cueqcl",
  mapsUrl:  "https://maps.app.goo.gl/NAYnDg7UhBcZgL7R8",
  addrTh:   "เลขที่ 31/1 ซอยเชื้อเพลิง(อมร) ถนนเชื้อเพลิง แขวงช่องนนทรี เขตยานนาวา กรุงเทพมหานคร 10120",
  addrEn:   "31/1 Soi Chuaploeng (Amorn), Chongnonsee, Yannawa, Bangkok 10120",
  taxId:    "0115544003652"
};

/* ---- icons ---- */
const I = {
  phone:'<path d="M5 4h3l1.5 4-2 1.5a11 11 0 005 5L19 12l4 1.5V18a2 2 0 01-2 2A16 16 0 014 5a2 2 0 011-1z"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/>',
  line:'<rect x="3" y="4" width="18" height="14" rx="6"/><path d="M9 17l-2 3 5-3"/>',
  map:'<path d="M12 21s7-6.5 7-12a7 7 0 10-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/>',
  save:'<path d="M5 3h11l3 3v15H5z"/><path d="M8 3v6h7V3"/><path d="M8 14h8"/>',
};

/* ---- apply text ---- */
const $=s=>document.querySelector(s);
$('#i-nameth').textContent=CARD.nameTh;
$('#i-nameen').textContent=CARD.nameEn;
$('#i-titleth').textContent=CARD.titleTh;
$('#i-titleen').textContent=CARD.titleEn;
$('#f-coth').textContent=CARD.companyTh;
$('#f-addr').textContent=CARD.addrTh;
$('#f-tax').textContent='เลขประจำตัวผู้เสียภาษี '+CARD.taxId+' (สำนักงานใหญ่)';
$('#f-coen').textContent=CARD.companyEn;
$('#f-addren').textContent=CARD.addrEn;
$('#f-taxen').textContent='TAX ID '+CARD.taxId+' (HEAD OFFICE)';

/* ---- build action buttons ---- */
const tel=n=>'tel:'+n.replace(/[^+\d]/g,'');
const lineHref=/^https?:/.test(CARD.lineId)?CARD.lineId:('https://line.me/ti/p/~'+CARD.lineId.replace(/[^\w.-]/g,''));
const acts=[
  {cls:'',href:tel(CARD.phone),ico:'phone',k:'โทร · CALL',v:CARD.phone},
  {cls:'',href:tel(CARD.phone2),ico:'phone',k:'โทร · CALL',v:CARD.phone2},
  {cls:'',href:lineHref,ico:'line',k:'LINE',v:CARD.lineId},
  {cls:'',href:CARD.mapsUrl,ico:'map',k:'แผนที่ · LOCATION',v:'ยานนาวา กรุงเทพฯ'},
  {cls:'wide',href:'mailto:'+CARD.email,ico:'mail',k:'อีเมล · EMAIL',v:CARD.email},
];
const wrap=$('#actions');
acts.forEach(a=>{
  const el=document.createElement('a');
  el.className='act '+a.cls;el.href=a.href;
  if(a.ico==='map'||a.ico==='line')el.target='_blank';el.rel='noopener';
  el.innerHTML=`<span class="ico"><svg viewBox="0 0 24 24">${I[a.ico]}</svg></span>
    <span class="tx"><span class="k">${a.k}</span><span class="v">${a.v}</span>${a.note?`<span class="note">${a.note}</span>`:''}</span>`;
  wrap.appendChild(el);
});
/* save contact (vCard) */
const save=document.createElement('a');
save.className='act save';save.href='#';
save.innerHTML=`<span class="ico"><svg viewBox="0 0 24 24">${I.save}</svg></span>
  <span class="tx"><span class="k">VCARD</span><span class="v">บันทึกลงรายชื่อ · Save contact</span></span>`;
save.addEventListener('click',e=>{e.preventDefault();downloadVCard();});
wrap.appendChild(save);
/* qr button */
const qrb=document.createElement('a');
qrb.className='act qrbtn';qrb.href='#';
qrb.innerHTML='<span class="tx"><span class="v">▣ แสดง QR เพื่อแชร์</span></span>';
qrb.addEventListener('click',e=>{e.preventDefault();openQR();});
wrap.appendChild(qrb);

/* ---- vCard ---- */
function downloadVCard(){
  const v=[
    'BEGIN:VCARD','VERSION:3.0',
    'N:;'+CARD.nameEn+';;;','FN:'+CARD.nameEn,
    'ORG:'+CARD.companyEn,'TITLE:'+CARD.titleEn,
    'TEL;TYPE=CELL:'+CARD.phone,'TEL;TYPE=CELL:'+CARD.phone2,'EMAIL:'+CARD.email,
    'ADR;TYPE=WORK:;;'+CARD.addrEn+';;;;',
    'URL:'+location.href,
    'NOTE:LINE '+CARD.lineId+' · TAX ID '+CARD.taxId+' (HEAD OFFICE) · '+CARD.addrTh,
    'END:VCARD'
  ].join('\r\n');
  const blob=new Blob([v],{type:'text/vcard'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=(CARD.nameEn.replace(/[^\w]+/g,'_')||'contact')+'.vcf';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

/* ---- QR ---- */
let qrMade=false;
function openQR(){
  const m=$('#modal');m.classList.add('on');
  $('#qr-url').textContent=location.href;
  if(!qrMade){
    try{new QRCode(document.getElementById('qr'),{text:location.href,width:200,height:200,
      colorDark:'#171A1E',colorLight:'#ffffff'});qrMade=true;}
    catch(e){$('#qr').textContent='เปิดหน้านี้บนเว็บจริงเพื่อสร้าง QR';}
  }
}
$('#qr-close').addEventListener('click',()=>$('#modal').classList.remove('on'));
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')$('#modal').classList.remove('on');});
</script>
</body>
</html>
