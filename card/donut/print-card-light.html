<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นามบัตรกระดาษ (พื้นขาว) — Green Yellow Transport (90×55mm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Saira:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --card:#FFFFFF; --ink:#171A1E; --ink-soft:#39414A;
    --muted:#6A727A; --hair:#E4E8E4;
    --green:#0E9B4A; --green-deep:#0A7B3A; --yellow:#FFCE00; --gold:#8F6606;
    --cond:'Saira Condensed','IBM Plex Sans Thai',sans-serif;
    --sans:'Saira',sans-serif;
    --thai:'IBM Plex Sans Thai',sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0C0E10;color:#EEF1ED;font-family:var(--thai);
    padding:30px 16px 90px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .hint{max-width:380px;text-align:center;color:#8A949C;font-size:12.5px;line-height:1.6;margin-bottom:8px}
  .hint b{color:var(--yellow);font-weight:600}
  .hint a{color:var(--green);text-decoration:none;font-weight:600}
  .label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:#8A949C}
  .print-btn{position:fixed;right:16px;bottom:16px;z-index:20;border:none;cursor:pointer;
    background:var(--green);color:#fff;font-family:var(--cond);font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;font-size:13px;padding:13px 20px;border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.4)}

  /* ---------- CARD ---------- */
  .card{
    position:relative;width:90mm;height:55mm;background:var(--card);overflow:hidden;
    box-shadow:0 18px 44px rgba(0,0,0,.45);border-radius:2.5mm;color:var(--ink);
    border:.25mm solid var(--hair);display:flex;flex-direction:column;justify-content:center;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .bar{position:absolute;left:0;top:0;bottom:0;width:2.4mm;
    background:linear-gradient(180deg,var(--green) 0%,var(--green) 45%,var(--yellow) 100%);
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .inner{width:100%;padding:0 6mm 0 9mm}

  /* header: logo + company */
  .head{display:flex;align-items:center;gap:3mm}
  .head .logo{width:16mm;height:11.3mm;flex:none;display:grid;place-items:center}
  .head .logo img{width:100%;height:100%;object-fit:contain;display:block;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cnm{font-family:var(--cond);text-transform:uppercase;line-height:1.05}
  .card.th .cnm{font-family:var(--thai);text-transform:none}
  .cnm .l1{font-size:3.7mm;font-weight:700;letter-spacing:.02em;color:var(--ink)}
  .card.th .cnm .l1{font-size:3.3mm}
  .cnm .l1 .g{color:var(--green-deep)} .cnm .l1 .y{color:var(--gold)}
  .cnm .l2{font-size:2.45mm;font-weight:700;letter-spacing:.1em;color:var(--ink);margin-top:.5mm}
  .card.th .cnm .l2{letter-spacing:0}

  .divider{height:.25mm;background:var(--hair);margin:1.2mm 0;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}

  /* identity + contacts (single column, full width) */
  .nm{font-family:var(--sans);font-weight:700;font-size:4.8mm;line-height:1.02;color:var(--ink);letter-spacing:-.01em}
  .card.th .nm{font-family:var(--thai)}
  .ti{display:flex;align-items:center;gap:2mm;margin-top:.8mm}
  .ti .rule{width:5mm;height:.8mm;background:var(--green);border-radius:1mm;flex:none;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ti .t{font-family:var(--sans);font-weight:700;font-size:3mm;color:var(--green-deep);letter-spacing:.02em}
  .card.th .ti .t{font-family:var(--thai)}

  .clist{margin-top:1.5mm;display:flex;flex-direction:column;gap:1mm}
  .c{display:flex;align-items:flex-start;gap:2.3mm;min-width:0}
  .c .ic{width:4.3mm;height:4.3mm;flex:none;display:grid;place-items:center;margin-top:.2mm}
  .c .ic svg{width:4mm;height:4mm;stroke:var(--green);fill:none;stroke-width:1.8}
  .c .v{font-family:var(--thai);font-size:3mm;font-weight:600;color:var(--ink);line-height:1.2;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .c.addr .v{font-family:var(--sans);font-weight:500;font-size:2.35mm;color:var(--ink-soft);line-height:1.25;
    white-space:normal;overflow:visible;text-overflow:clip;overflow-wrap:break-word}
  .card.th .c.addr .v{font-family:var(--thai)}
  .tax{font-family:var(--mono);font-size:2.2mm;font-weight:700;color:var(--ink);margin-top:1.1mm;line-height:1.2}

  @media print{
    @page{size:90mm 55mm;margin:0}
    body{background:#fff;padding:0;gap:0;display:block}
    .hint,.label,.print-btn{display:none!important}
    .card{box-shadow:none;border-radius:0;border:none;page-break-after:always;margin:0}
    .card:last-of-type{page-break-after:auto}
  }
</style>
</head>
<body>
  <p class="hint">นามบัตรกระดาษ <b>พื้นขาว · 2 ภาษา</b> · <b>90×55 มม.</b> — หน้า 1 = อังกฤษ · หน้า 2 = ไทย<br>
  กด <b>“พิมพ์ / Save PDF”</b> มุมขวาล่าง · ตั้งระยะขอบ 0 และเปิด “Background graphics”</p>

  <div id="cards"></div>

  <button class="print-btn" onclick="window.print()">⎙ พิมพ์ / Save PDF</button>

<script>
/* ============================================================
   ✏️  แก้ข้อมูลที่นี่ที่เดียว — พื้นขาว 2 ภาษา (หน้า1 อังกฤษ · หน้า2 ไทย)
   ============================================================ */
const D={
  phone:"085-551-3555", phone2:"",
  email:"greenyellowtransportthai@hotmail.com", lineId:"",
  taxId:"0115544003652",
  addrEn:"31/1 Soi Chuaploeng (Amorn), Chongnonsee, Yannawa, Bangkok 10120",
  addrTh:"เลขที่ 31/1 ซอยเชื้อเพลิง(อมร) ถนนเชื้อเพลิง แขวงช่องนนทรี เขตยานนาวา กรุงเทพมหานคร 10120",
  qrUrl:"https://gyt-card.vercel.app/donut"
};
const phones=D.phone2?D.phone+"  ·  "+D.phone2:D.phone;
const emailBrk=D.email.replace('@','​@');
const SIDES=[
  { cls:'en', label:'หน้า 1 · ENGLISH (อังกฤษ)',
    co1:'<span class="g">GREEN</span> <span class="y">YELLOW</span> TRANSPORT', co2:'THAILAND CO., LTD.',
    name:'Sitanan Paladthuam (DONUT)', title:'Assistant Director',
    line:'LINE: '+D.lineId, addr:D.addrEn, tax:'TAX ID '+D.taxId+' (HEAD OFFICE)' },
  { cls:'th', label:'หน้า 2 · ภาษาไทย',
    co1:'บริษัท <span class="g">กรีนเยลโล่</span> ทรานสปอร์ต', co2:'(ประเทศไทย) จำกัด',
    name:'สิตานันท์ ปลัดท้วม (โดนัท)', title:'ผู้ช่วยกรรมการ',
    line:'LINE: '+D.lineId, addr:D.addrTh, tax:'เลขประจำตัวผู้เสียภาษี '+D.taxId+' (สำนักงานใหญ่)' }
];
const I={
  phone:'<path d="M5 4h3l1.5 4-2 1.5a11 11 0 005 5L19 12l4 1.5V18a2 2 0 01-2 2A16 16 0 014 5a2 2 0 011-1z"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/>',
  line:'<rect x="3" y="4" width="18" height="14" rx="6"/><path d="M9 17l-2 3 5-3"/>',
  map:'<path d="M12 21s7-6.5 7-12a7 7 0 10-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/>'
};
const ic=p=>`<span class="ic"><svg viewBox="0 0 24 24">${p}</svg></span>`;
const host=document.getElementById('cards');
SIDES.forEach(s=>{
  const lab=document.createElement('div');lab.className='label';lab.textContent=s.label;host.appendChild(lab);
  const card=document.createElement('div');card.className='card '+s.cls;
  card.innerHTML=`
    <span class="bar"></span>
    <div class="inner">
      <div class="head">
        <div class="logo"><img src="logo.png" alt="Green Yellow Transport"></div>
        <div class="cnm"><div class="l1">${s.co1}</div><div class="l2">${s.co2}</div></div>
      </div>
      <div class="divider"></div>
      <div class="nm">${s.name}</div>
      <div class="ti"><span class="rule"></span><span class="t">${s.title}</span></div>
      <div class="clist">
        <div class="c">${ic(I.phone)}<span class="v">${phones}</span></div>
        ${D.lineId?`<div class="c">${ic(I.line)}<span class="v">${s.line}</span></div>`:''}
        <div class="c">${ic(I.mail)}<span class="v">${emailBrk}</span></div>
        <div class="c addr">${ic(I.map)}<span class="v">${s.addr}</span></div>
      </div>
    </div>`;
  host.appendChild(card);
});

/* stretch the sub-line (THAILAND CO.,LTD. / (ประเทศไทย) จำกัด) to match the company-name width above it */
function fitSub(){
  document.querySelectorAll('.card .cnm').forEach(cnm=>{
    const l1=cnm.querySelector('.l1'), l2=cnm.querySelector('.l2');
    if(!l1||!l2) return;
    l2.style.letterSpacing='normal'; l2.style.display='inline-block';
    const w1=l1.getBoundingClientRect().width, w2=l2.getBoundingClientRect().width;
    const n=(l2.textContent||'').length||1;
    l2.style.letterSpacing=(w1>w2?(w1-w2)/n:0)+'px';
    l2.style.display='block';
  });
}
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fitSub);}
window.addEventListener('load',fitSub);
fitSub();
</script>
</body>
</html>
