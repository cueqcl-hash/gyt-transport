<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นามบัตรกระดาษ (พื้นขาว) — Green Yellow Transport (90×55mm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Saira:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --card:#FFFFFF; --ink:#171A1E; --ink-soft:#39414A;
    --muted:#6A727A; --hair:#E4E8E4; --soft:#F4F6F4;
    --green:#0E9B4A; --green-deep:#0A7B3A; --yellow:#FFCE00; --gold:#8F6606;
    --cond:'Saira Condensed','IBM Plex Sans Thai',sans-serif;
    --sans:'Saira',sans-serif;
    --thai:'IBM Plex Sans Thai',sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0C0E10;color:#EEF1ED;font-family:var(--thai);
    padding:30px 16px 90px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .hint{max-width:380px;text-align:center;color:#8A949C;font-size:12.5px;line-height:1.6;margin-bottom:8px}
  .hint b{color:var(--yellow);font-weight:600}
  .hint a{color:var(--green);text-decoration:none;font-weight:600}
  .label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:#8A949C}
  .print-btn{position:fixed;right:16px;bottom:16px;z-index:20;border:none;cursor:pointer;
    background:var(--green);color:#fff;font-family:var(--cond);font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;font-size:13px;padding:13px 20px;border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.4)}

  /* ---------- CARD SHELL ---------- */
  .card{
    position:relative;width:90mm;height:55mm;background:var(--card);overflow:hidden;
    box-shadow:0 18px 44px rgba(0,0,0,.45);border-radius:2.5mm;color:var(--ink);
    border:.25mm solid var(--hair);display:flex;flex-direction:column;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .bar{position:absolute;left:0;top:0;bottom:0;width:2.4mm;
    background:linear-gradient(180deg,var(--green) 0%,var(--green) 45%,var(--yellow) 100%);
    -webkit-print-color-adjust:exact;print-color-adjust:exact}

  /* ========== PAGE 1 · COMPANY ========== */
  .front{justify-content:center;align-items:center;text-align:center;padding:3.2mm 6mm 3.2mm 9mm}
  .company{display:flex;flex-direction:column;align-items:center}
  .c-logo{width:24mm;height:16.5mm}
  .c-logo img{width:100%;height:100%;object-fit:contain;display:block;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .c-name-en{font-family:var(--cond);text-transform:uppercase;font-weight:700;font-size:3.6mm;
    letter-spacing:.02em;color:var(--ink);line-height:1.08;margin-top:1.4mm}
  .c-name-en .y{color:var(--gold)} .c-name-en .g{color:var(--green-deep)}
  .c-name-th{font-family:var(--thai);font-weight:700;font-size:3.3mm;color:var(--ink);margin-top:.6mm;line-height:1.15}
  .c-rule{width:16mm;height:.8mm;border-radius:1mm;margin:1.6mm 0 1.4mm;
    background:linear-gradient(90deg,var(--green),var(--yellow));
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .c-addr{font-family:var(--thai);font-size:2.5mm;line-height:1.3;color:var(--ink-soft);max-width:75mm}
  .c-addr .en{font-family:var(--sans);color:var(--muted);margin-top:.5mm}
  .c-tax{font-family:var(--mono);font-size:2.4mm;color:var(--ink);font-weight:700;margin-top:.9mm}

  /* ========== PAGE 2 · PERSON ========== */
  .p-head{flex:none;padding:4mm 6mm 0 9mm}
  .p-nth{font-family:var(--thai);font-weight:700;font-size:5.5mm;line-height:1.04;color:var(--ink);letter-spacing:-.01em}
  .p-nen{font-family:var(--cond);text-transform:uppercase;font-weight:600;
    font-size:2.7mm;letter-spacing:.16em;color:var(--muted);margin-top:.9mm}
  .p-title{display:flex;align-items:center;flex-wrap:wrap;gap:0 2.4mm;margin-top:2mm}
  .p-title .rule{width:6mm;height:.8mm;background:var(--green);border-radius:1mm;flex:none;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .p-title .tth{font-family:var(--thai);font-weight:700;font-size:3.2mm;color:var(--ink)}
  .p-title .ten{font-family:var(--mono);font-size:2.1mm;letter-spacing:.08em;color:var(--green);font-weight:700}
  .p-main{flex:1;display:flex;gap:4.5mm;padding:2.5mm 6mm 4mm 9mm;align-items:center;min-height:0}
  .p-contact{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2.3mm;min-width:0}
  .row{display:flex;align-items:center;gap:2.6mm;min-width:0}
  .row .ic{width:5mm;height:5mm;flex:none;display:grid;place-items:center}
  .row .ic svg{width:4.4mm;height:4.4mm;stroke:var(--green);fill:none;stroke-width:1.7}
  .row .tx{min-width:0;display:flex;flex-direction:column}
  .row .k{font-family:var(--mono);font-size:1.7mm;letter-spacing:.14em;color:var(--muted);line-height:1}
  .row .v{font-family:var(--thai);font-size:3.2mm;font-weight:700;line-height:1.12;margin-top:.35mm;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .v.wrap{white-space:normal;overflow:visible;text-overflow:clip;font-size:2.6mm;line-height:1.12;word-break:normal;overflow-wrap:break-word}
  .p-qr{width:22mm;flex:none;display:flex;flex-direction:column;align-items:center;gap:1.2mm}
  .p-qr .frame{width:21.5mm;height:21.5mm;background:#fff;border:.25mm solid var(--hair);border-radius:1.4mm;padding:1mm;display:grid;place-items:center}
  .p-qr .frame img,.p-qr .frame canvas{width:100%!important;height:100%!important;display:block}
  .p-qr .cap{font-family:var(--mono);font-size:1.75mm;letter-spacing:.14em;color:var(--green);text-align:center;font-weight:700}

  @media print{
    @page{size:90mm 55mm;margin:0}
    body{background:#fff;padding:0;gap:0;display:block}
    .hint,.label,.print-btn{display:none!important}
    .card{box-shadow:none;border-radius:0;border:none;page-break-after:always;margin:0}
    .card:last-of-type{page-break-after:auto}
  }
</style>
</head>
<body>
  <p class="hint">นามบัตรกระดาษ <b>พื้นขาว</b> · <b>90×55 มม.</b> — หน้า 1 = บริษัท · หน้า 2 = ส่วนตัว<br>
  กด <b>“พิมพ์ / Save PDF”</b> มุมขวาล่าง · ตั้งระยะขอบ 0 และเปิด “Background graphics”<br>
  อยากได้ <a href="print-card">เวอร์ชันพื้นดำ →</a></p>

  <div class="label">หน้า 1 · บริษัท (FRONT)</div>
  <div class="card front">
    <span class="bar"></span>
    <div class="company">
      <div class="c-logo"><img src="logo.png" alt="โลโก้ Green Yellow Transport"></div>
      <div class="c-name-en"><span class="g">GREEN</span> <span class="y">YELLOW</span> TRANSPORT (THAILAND) CO.,LTD.</div>
      <div class="c-name-th" id="coth"></div>
      <div class="c-rule"></div>
      <div class="c-addr">
        <div id="caddrth"></div>
        <div class="en" id="caddren"></div>
      </div>
      <div class="c-tax" id="ctax"></div>
    </div>
  </div>

  <div class="label">หน้า 2 · ส่วนตัว (BACK)</div>
  <div class="card back">
    <span class="bar"></span>
    <div class="p-head">
      <div class="p-nth" id="nth"></div>
      <div class="p-nen" id="nen"></div>
      <div class="p-title"><span class="rule"></span><span class="tth" id="tth"></span><span class="ten" id="ten"></span></div>
    </div>
    <div class="p-main">
      <div class="p-contact" id="contact"></div>
      <div class="p-qr">
        <div class="frame" id="qr"></div>
        <div class="cap">SCAN → ดิจิทัล</div>
      </div>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()">⎙ พิมพ์ / Save PDF</button>

<script>
/* ============================================================
   ✏️  แก้ข้อมูลที่นี่ที่เดียว — พื้นขาว (หน้า1 บริษัท · หน้า2 ส่วนตัว)
   ============================================================ */
const CARD={
  nameTh:"พิศลย์ โพนทองถิ่น (คิว)", nameEn:"Pisoln Ponthongthin (CUE)",
  titleTh:"ผู้จัดการฝ่ายปฏิบัติการ", titleEn:"OPERATIONS MANAGER",
  phone:"081-828-7991", phone2:"086-412-5355",
  email:"greenyellowtransportthai@hotmail.com", lineId:"cueqcl",
  coTh:"บริษัท กรีนเยลโล่ ทรานสปอร์ต (ประเทศไทย) จำกัด",
  coAddrTh:"เลขที่ 31/1 ซอยเชื้อเพลิง(อมร) ถนนเชื้อเพลิง แขวงช่องนนทรี เขตยานนาวา กรุงเทพมหานคร 10120",
  coAddrEn:"31/1 Soi Chuaploeng (Amorn), Chongnonsee, Yannawa, Bangkok 10120",
  taxId:"0115544003652",
  qrUrl:"https://gyt-card.vercel.app"   // ← ลิงก์นามบัตรดิจิทัล (production)
};

const $=s=>document.querySelector(s);
/* page 1 — company */
$('#coth').textContent=CARD.coTh;
$('#caddrth').textContent=CARD.coAddrTh;
$('#caddren').textContent=CARD.coAddrEn;
$('#ctax').textContent='เลขประจำตัวผู้เสียภาษี '+CARD.taxId+' (สำนักงานใหญ่)';
/* page 2 — person */
$('#nth').textContent=CARD.nameTh; $('#nen').textContent=CARD.nameEn;
$('#tth').textContent=CARD.titleTh; $('#ten').textContent=CARD.titleEn;

const I={
  phone:'<path d="M5 4h3l1.5 4-2 1.5a11 11 0 005 5L19 12l4 1.5V18a2 2 0 01-2 2A16 16 0 014 5a2 2 0 011-1z"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/>',
  line:'<rect x="3" y="4" width="18" height="14" rx="6"/><path d="M9 17l-2 3 5-3"/>'
};
const rows=[
  {ic:'phone',k:'มือถือ · MOBILE',v:CARD.phone},
  {ic:'phone',k:'มือถือ · MOBILE',v:CARD.phone2},
  {ic:'line',k:'LINE',v:CARD.lineId},
  {ic:'mail',k:'อีเมล · EMAIL',v:CARD.email.replace('@','​@'),wrap:true},
];
const c=$('#contact');
rows.forEach(r=>{
  const d=document.createElement('div');d.className='row';
  d.innerHTML=`<span class="ic"><svg viewBox="0 0 24 24">${I[r.ic]}</svg></span>
    <span class="tx"><span class="k">${r.k}</span><span class="v${r.wrap?' wrap':''}">${r.v}</span></span>`;
  c.appendChild(d);
});
try{new QRCode(document.getElementById('qr'),{text:CARD.qrUrl,width:130,height:130,
  colorDark:'#171A1E',colorLight:'#ffffff'});}
catch(e){$('#qr').innerHTML='<span style="font-family:monospace;font-size:2mm;color:#888">QR</span>';}
</script>
</body>
</html>
